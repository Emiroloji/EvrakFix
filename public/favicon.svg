<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <!-- Folder Back Gradient -->
    <linearGradient id="folderBackGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </linearGradient>
    
    <!-- Folder Front Gradient -->
    <linearGradient id="folderFrontGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af" />
      <stop offset="50%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    
    <!-- Keyhole Gradient (Glow Effect) -->
    <linearGradient id="keyholeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f7fa" />
      <stop offset="50%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    
    <!-- Arrow Swoop Gradient -->
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="50%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>
    
    <!-- Drop Shadow Filter for Depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Folder Back Flap -->
  <path d="M25,28 C25,24.68 27.68,22 31,22 H48 L56,32 H89 C92.31,32 95,34.68 95,38 V82 C95,85.31 92.31,88 89,88 H31 C27.68,88 25,85.31 25,82 Z" fill="url(#folderBackGrad)" />

  <!-- Folder Front Flap with Shadow -->
  <path d="M25,38 C25,34.68 27.68,32 31,32 H89 C92.31,32 95,34.68 95,38 V82 C95,85.31 92.31,88 89,88 H31 C27.68,88 25,85.31 25,82 Z" fill="url(#folderFrontGrad)" filter="url(#shadow)" />

  <!-- Keyhole (Security Lock Icon) -->
  <g filter="url(#shadow)">
    <!-- Keyhole Circle -->
    <circle cx="60" cy="54" r="8" fill="url(#keyholeGrad)" />
    <!-- Keyhole Tapered Trapezoid -->
    <path d="M56.5,59.5 L63.5,59.5 L66.5,72 C66.5,73.1 65.6,74 64.5,74 H55.5 C54.4,74 53.5,73.1 53.5,72 Z" fill="url(#keyholeGrad)" />
  </g>

  <!-- Swooping Curved Teal/Cyan Arrow -->
  <path d="M21,78 C25,93 48,103 70,93 C77,89 84,83 89,75 L80,73 L99,65 L103,85 L94,82 C89,90 82,96 73,100 C48,110 23,99 21,78 Z" fill="url(#arrowGrad)" filter="url(#shadow)" />
</svg>